<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>task-management-frontend</title>
    <script>
      (function () {
        try {
          var storedUser = localStorage.getItem("taskflowUser")
          var storedTheme = localStorage.getItem("taskflowTheme")
          var userTheme = storedUser
            ? JSON.parse(storedUser).user?.theme
            : null
          var theme = userTheme || storedTheme || "dark"
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches
          var resolvedTheme = theme === "system"
            ? prefersDark
              ? "dark"
              : "light"
            : theme
          document.documentElement.classList.remove("dark", "light")
          document.documentElement.classList.add(resolvedTheme)
          document.documentElement.dataset.theme = resolvedTheme
          document.documentElement.dataset.themePreference = theme
          document.documentElement.style.colorScheme = resolvedTheme
        } catch (error) {
          document.documentElement.classList.add("dark")
          document.documentElement.dataset.theme = "dark"
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
